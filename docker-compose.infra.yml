# Infrastructure services only — backend/frontend run natively so COM3 (Arduino) is accessible
# Ollama is optional because the backend continues to run without it.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: servante_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    environment:
      CHROMA_SERVER_CORS_ALLOW_ORIGINS: "*"
    volumes:
      - chromadb_data:/chroma/data

  ollama:
    image: ollama/ollama:latest
    profiles: [ "optional" ]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

volumes:
  postgres_data:
  chromadb_data:
  ollama_data:
